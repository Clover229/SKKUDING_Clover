<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      .container{
            color: white;
            display: flex;
            flex-direction: column;
        }
        header{
            
            border-bottom:1px solid rgb(247, 196, 55);
            padding-left:20px;
            padding-bottom: 20px;
            padding-top: 10px;
            
        }
        header>a{
            color: rgb(247, 196, 55);
            text-decoration: none;
            font-size: 30px;
            font-weight: 1000;
        }
        .content{
            padding-top: 30px;
            display:flex;
            flex-direction: column;
        }
        .imgbox{
            
            display: block;
            margin: auto;/*auto값은 좌우여백같이*/
            border-radius: 100%;
            border: 3px solid rgb(247, 196, 55);
            overflow: hidden;
        }
        .profile{
            object-fit: cover;
            
        }
        main{
            padding-top:40px;
            text-align: center;
            padding-bottom:40px;
            font-size: 50px;
            font-weight: 1000;
        }
        
        table{
            padding: 10px;
            border-collapse: separate;
            border-radius: 0.5 rem;
            border-spacing: 0;
            margin: auto; 
            border: 1px solid rgb(247, 196, 55);
            
        }
        td{
            /* border-bottom: 3px solid rgb(247, 196, 55);
            padding: 10px; */
            border: none;
        }
        tr{
            border-bottom:1px solid rgb(247, 196, 55) !important;
        }

        td:not(:last-child) {
            border-right: none; 
        }
        
    </style>
  </head>
  <body bgcolor="black">
    <div class="container">
        <header>
            <a href="../">Pokemon List</a>
        </header>
        <section class="content">
            <div class="imgbox">
            <img class="profile" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="bulbasaur">
            </div>
            <main>
                Bulbasaur
            </main>
            <table border="1" style="table-layout: fixed;">
                <tr>
                    <td>Height</td> <td>7 dm</td>
                </tr>
                <tr>
                    <td>Weight</td> <td>69 hg</td>
                </tr>
                <tr>
                    <td>Types</td> <td>grass,poison</td>
                </tr>
                <tr>
                    <td>Base Experience</td> <td>64</td>
                </tr>
                <tr>
                    <td>Abilities</td> <td>overgrow, chlorophyll</td>
                </tr>
                <tr>
                    <td>Hp</td> <td>45</td>
                </tr>
                <tr>
                    <td>Attack</td> <td>49</td>
                </tr>
                <tr>
                    <td>Defence</td> <td>49</td>
                </tr>
                <tr>
                    <td>Special-Attack</td> <td>65</td>
                </tr>
                <tr>
                    <td>Special-Defence</td> <td>65</td>
                </tr>
                <tr>
                    <td>Speed</td> <td>45</td>
                </tr>
            </table>
        </section>
        
        
        
    </div>
    
  </body>
</html>
